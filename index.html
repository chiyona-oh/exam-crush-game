<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#111111"/>
  <title>수능 시험지 뿌시기</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #111;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      cursor: crosshair;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    /* 가로 모드 경고 오버레이 (모바일 전용) */
    #landscape-warn {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #111;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Malgun Gothic", sans-serif;
      font-size: 5vw;
      text-align: center;
      gap: 16px;
    }
    #landscape-warn .icon { font-size: 14vw; }
    /* 모바일에서만 가로 경고 표시 (600px 미만) */
    @media screen and (orientation: landscape) and (max-width: 599px) {
      #landscape-warn { display: flex; }
      canvas { display: none; }
    }
    /* PC(600px 이상): 중앙 정렬 + 어두운 외곽 배경 */
    @media (min-width: 600px) {
      html, body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a14;
      }
      canvas {
        border-radius: 20px;
        box-shadow: 0 0 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
      }
      #landscape-warn { display: none !important; }
    }
  </style>
</head>
<body>
<div id="landscape-warn">
  <div class="icon">📱</div>
  세로 모드로 플레이해주세요
</div>
<canvas id="c"></canvas>
<script>
// ════════════════════════════════════════
// 캔버스 설정 (DPR 지원)
// ════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = Math.min(window.devicePixelRatio || 1, 2); // Retina 최대 2x
let LW = 0, LH = 0; // 논리적 화면 크기 (CSS 픽셀)

// PC 판단: 너비 600px 이상
function isPC() { return window.innerWidth >= 600; }

function resize() {
  if (isPC()) {
    // PC: 390×844 고정 세로 비율로 중앙 표시
    LW = 390; LH = 844;
  } else {
    // 모바일: 전체 화면
    LW = window.innerWidth;
    LH = window.innerHeight;
  }
  canvas.width  = Math.round(LW * dpr);
  canvas.height = Math.round(LH * dpr);
  canvas.style.width  = LW + 'px';
  canvas.style.height = LH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // DPR 스케일 적용
}
resize();
window.addEventListener('resize', resize);

// 세로 모드 잠금 시도 (지원하는 브라우저에서만 동작)
try { screen.orientation.lock('portrait').catch(() => {}); } catch(e) {}

// ════════════════════════════════════════
// 유틸 — 색상 변환 / 시드 난수
// ════════════════════════════════════════
function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
// 결정론적 시드 난수 (배경 그리기 — 매 프레임 같은 위치 보장)
let _rs = 1;
function initRand(s) { _rs = (Math.abs(s|0) * 374761 + 49297) % 2147483647 || 1; }
function srand()     { _rs = (_rs * 16807) % 2147483647; return _rs / 2147483647; }

// ════════════════════════════════════════
// 사운드 엔진 (Web Audio API)
// ════════════════════════════════════════
let audioCtx = null;
let audioReady = false; // 첫 터치 후 true

// AudioContext는 첫 터치/클릭 시 생성 (모바일 정책 대응)
function initAudio() {
  if (audioReady) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioReady = true;
  } catch(e) {}
}
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTear() {
  try {
    const a = ac(), len = a.sampleRate * 0.11, buf = a.createBuffer(1, len, a.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.8);
    const src = a.createBufferSource(); src.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2500;
    const g = a.createGain(); g.gain.value = 1.1;
    src.connect(f); f.connect(g); g.connect(a.destination); src.start();
  } catch(e) {}
}
function playBigTear() {
  try {
    const a = ac();
    for (let layer = 0; layer < 3; layer++) {
      const len = a.sampleRate*(0.9+layer*0.4), buf = a.createBuffer(1,len,a.sampleRate), d = buf.getChannelData(0);
      for (let i=0;i<len;i++) { const t=i/len; d[i]=(Math.random()*2-1)*Math.pow(1-t,0.7)*(0.6+0.4*Math.sin(i*0.008*(3-layer))); }
      const src = a.createBufferSource(); src.buffer = buf;
      const f = a.createBiquadFilter(); f.type = layer===0?'highpass':'lowpass'; f.frequency.value = layer===0?1200:900;
      const g = a.createGain(); g.gain.value = 0.9-layer*0.22;
      src.connect(f); f.connect(g); g.connect(a.destination); src.start(a.currentTime+layer*0.04);
    }
  } catch(e) {}
}
function playFailSound() {
  try {
    const a = ac(), osc = a.createOscillator(), g = a.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(110, a.currentTime);
    osc.frequency.linearRampToValueAtTime(40, a.currentTime+1.1);
    g.gain.setValueAtTime(0.38, a.currentTime); g.gain.linearRampToValueAtTime(0, a.currentTime+1.1);
    osc.connect(g); g.connect(a.destination); osc.start(); osc.stop(a.currentTime+1.1);
  } catch(e) {}
}

// ════════════════════════════════════════
// 레벨 데이터 — 수능 7개 과목
// ════════════════════════════════════════
const levelData = [
  { idx:0, subject:'국어',      goal: 80,  timeLimit:30, color:'#8B0000',
    fwColors:['#ff6b6b','#cc2222','#ff9999','#ffcccc','#ffe0e0','#ffffff'] },
  { idx:1, subject:'영어',      goal:100,  timeLimit:28, color:'#003580',
    fwColors:['#4d96ff','#0066cc','#99bbff','#aaddff','#ddeeff','#ffffff'] },
  { idx:2, subject:'한국사',    goal:120,  timeLimit:25, color:'#8B6914',
    fwColors:['#d4a017','#cc9900','#f0d060','#ffe090','#fff4c0','#fffde7'] },
  { idx:3, subject:'사회탐구',  goal:150,  timeLimit:25, color:'#006666',
    fwColors:['#00cccc','#009999','#66ffff','#aaffff','#ddfff0','#ffffff'] },
  { idx:4, subject:'과학탐구',  goal:180,  timeLimit:25, color:'#4B0082',
    fwColors:['#9b59b6','#7700cc','#cc88ff','#ddaaff','#eeddff','#ffffff'] },
  { idx:5, subject:'제2외국어', goal:190,  timeLimit:25, color:'#556B2F',
    fwColors:['#8bc34a','#6b8e23','#aad060','#ccee88','#eeffcc','#fffff0'] },
  { idx:6, subject:'수학',      goal:200,  timeLimit:25, color:'#1C1C5E',
    fwColors:['#4d96ff','#3355cc','#9999ff','#aabbff','#ddeeff','#ffffff'] },
];

let currentLevelIdx = 0;
function getLv() { return levelData[currentLevelIdx]; }

// ════════════════════════════════════════
// 저장/불러오기 (localStorage)
// ════════════════════════════════════════
const SAVE_KEY = 'suneung_torn_v1';
function getCleared()   { try { return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]'); } catch { return []; } }
function markCleared(i) { const c=getCleared(); if(!c.includes(i)){c.push(i);localStorage.setItem(SAVE_KEY,JSON.stringify(c));} }
function isUnlocked(i)  { return i===0 || getCleared().includes(i-1); }

// ════════════════════════════════════════
// 게임 상태 변수
// ════════════════════════════════════════
// state: 'select' | 'ready' | 'playing' | 'success' | 'fail'
let state        = 'select';
let taps         = 0;
let timeLeft     = 0;
let timerAccum   = 0;
let lastTime     = 0;
let lastSecond   = 0;
let timerPulse   = 0;
let shakeX=0, shakeY=0, shakeFr=0;
let stampSlam=0, successPhase=0, failPhase=0, fwTimer=0;
let cracks=[], particles=[];
let btnPrimary   = {x:0,y:0,w:0,h:0};
let btnSecondary = {x:0,y:0,w:0,h:0};
let levelCardBtns = [];
let currentFwColors = null;

// ════════════════════════════════════════
// 성능 자동 조절 (파티클 개수)
// ════════════════════════════════════════
let particleLimit = 60;
let _perfFrameTime = 16;

// ════════════════════════════════════════
// 시험지 레이아웃 (모바일 최적화)
// ════════════════════════════════════════
function getPaper() {
  // 상단 HUD 10% / 시험지 60% / 진행도 하단 15% / 엄지 안전지대 15%
  const maxPh = LH * 0.60;
  const maxPw = LW * 0.92;
  let pw = maxPw;
  let ph = pw * 1.41; // A4 비율
  if (ph > maxPh) { ph = maxPh; pw = ph / 1.41; }
  const px = (LW - pw) / 2;
  const py = LH * 0.10;
  return { x: px, y: py, w: pw, h: ph };
}

// ════════════════════════════════════════
// 크랙 생성 (게임플레이 로직 — 수정 없음)
// ════════════════════════════════════════
function addCrack(px, py, paper) {
  const rx=(px-paper.x)/paper.w, ry=(py-paper.y)/paper.h;
  const lines=[];
  for (let i=0;i<2+Math.floor(Math.random()*3);i++) {
    const angle=Math.random()*Math.PI*2, total=0.05+Math.random()*0.09, segs=3+Math.floor(Math.random()*4);
    const pts=[{x:rx,y:ry}]; let cx=rx,cy=ry;
    for (let s=0;s<segs;s++) {
      const a2=angle+(Math.random()-0.5)*1.0, dl=total/segs*(0.6+Math.random()*0.8);
      cx+=Math.cos(a2)*dl; cy+=Math.sin(a2)*dl; pts.push({x:cx,y:cy});
    }
    lines.push(pts);
  }
  cracks.push({rx,ry,lines});
}

// ════════════════════════════════════════
// 파티클 시스템
// ════════════════════════════════════════
class PaperBit {
  constructor(x,y,big) {
    const a=Math.random()*Math.PI*2, sp=big?4+Math.random()*11:1.5+Math.random()*4;
    this.x=x+(Math.random()-0.5)*(big?60:20); this.y=y+(Math.random()-0.5)*(big?60:20);
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp-(big?3.5:1.2);
    this.g=0.18+Math.random()*0.14;
    this.w=big?8+Math.random()*22:3+Math.random()*9; this.h=big?4+Math.random()*12:2+Math.random()*5;
    this.ang=Math.random()*Math.PI*2; this.spin=(Math.random()-0.5)*(big?0.22:0.38);
    this.life=1; this.decay=big?0.009+Math.random()*0.009:0.02+Math.random()*0.02;
    const pool=['#fffde7','#fff9c4','#ffffff','#f5f0d0','#fce4ec','#e3f2fd'];
    this.color=pool[Math.floor(Math.random()*pool.length)];
  }
  update() { this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=0.975;this.ang+=this.spin;this.life-=this.decay; }
  draw() {
    if(this.life<=0)return;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.ang);
    ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;
    ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);ctx.restore();
  }
  get dead(){return this.life<=0;}
}

// 폭죽 파티클 — 과목별 색상
class Spark {
  constructor(x,y) {
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*10;
    this.x=x; this.y=y; this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp-2.5;
    this.g=0.13; this.r=2+Math.random()*4; this.life=1; this.decay=0.012+Math.random()*0.013;
    const pool = currentFwColors || ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6fc8','#c77dff','#ffffff'];
    this.color=pool[Math.floor(Math.random()*pool.length)];
  }
  update() { this.x+=this.vx;this.y+=this.vy;this.vy+=this.g;this.vx*=0.97;this.life-=this.decay; }
  draw() {
    if(this.life<=0)return;
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  get dead(){return this.life<=0;}
}

function spawnFirework() {
  const x=LW*0.08+Math.random()*LW*0.84;
  const y=LH*0.04+Math.random()*LH*0.52;
  for(let i=0;i<44;i++) particles.push(new Spark(x,y));
}
function spawnSuccessExplosion() {
  const p=getPaper(),cx=p.x+p.w/2,cy=p.y+p.h/2;
  const count = Math.min(90, particleLimit);
  for(let i=0;i<count;i++) particles.push(new PaperBit(cx+(Math.random()-0.5)*p.w,cy+(Math.random()-0.5)*p.h,true));
}

// ════════════════════════════════════════
// 유틸 — 둥근 사각형 / 버튼
// ════════════════════════════════════════
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function drawBtn(btn,label,c1,c2,border,fs) {
  ctx.fillStyle='rgba(0,0,0,0.4)'; roundRect(btn.x+3,btn.y+3,btn.w,btn.h,12); ctx.fill();
  const g=ctx.createLinearGradient(btn.x,btn.y,btn.x,btn.y+btn.h);
  g.addColorStop(0,c1); g.addColorStop(1,c2); ctx.fillStyle=g;
  roundRect(btn.x,btn.y,btn.w,btn.h,12); ctx.fill();
  ctx.strokeStyle=border; ctx.lineWidth=2; roundRect(btn.x,btn.y,btn.w,btn.h,12); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font=`bold ${fs || Math.max(16, LW*0.045)}px "Malgun Gothic",sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,btn.x+btn.w/2,btn.y+btn.h/2);
}
function hitBtn(px,py,btn) { return btn.w>0&&px>=btn.x&&px<=btn.x+btn.w&&py>=btn.y&&py<=btn.y+btn.h; }

// ════════════════════════════════════════
// 배경
// ════════════════════════════════════════
function drawBackground() {
  const g=ctx.createRadialGradient(LW/2,LH/2,0,LW/2,LH/2,Math.max(LW,LH)*0.75);
  g.addColorStop(0,'#1c1c2e'); g.addColorStop(1,'#0a0a14');
  ctx.fillStyle=g; ctx.fillRect(0,0,LW,LH);
}

// ════════════════════════════════════════
// 과목별 시험지 배경 그리기 함수들
// (seeded random — 매 프레임 동일한 위치 보장)
// ════════════════════════════════════════

// 국어 — 한글 자모/음절 산포 + 세로쓰기
function drawBgKorean(p, ctop) {
  initRand(101);
  const cbot=p.h/2-8, ch=cbot-ctop;
  const chars='ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅎ가나다라마바사아자하글문자어휘의를이에'.split('');
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#1a0000';
  for(let i=0;i<26;i++){
    const c2=chars[Math.floor(srand()*chars.length)], fs=10+srand()*14;
    const x=-p.w*0.44+srand()*p.w*0.88, y=ctop+4+srand()*(ch-8);
    ctx.globalAlpha=0.09+srand()*0.07;
    ctx.font=`${fs}px "Batang",serif`; ctx.fillText(c2,x,y);
  }
  const vTexts=['문학과독서이해','시조와현대시'];
  const vFs=Math.max(10,p.w*0.026);
  ctx.font=`${vFs}px "Batang",serif`; ctx.fillStyle='#1a0000';
  for(let c=0;c<2;c++){
    const tx=-p.w*0.36+c*p.w*0.65, ty=ctop+12;
    const text=vTexts[c];
    for(let j=0;j<Math.min(text.length,7);j++){
      ctx.globalAlpha=0.09; ctx.fillText(text[j],tx,ty+j*(vFs+4));
    }
  }
  ctx.globalAlpha=1;
}

// 영어 — 알파벳 산포 + 영단어
function drawBgEnglish(p, ctop) {
  initRand(102);
  const cbot=p.h/2-8, ch=cbot-ctop;
  const upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const lower='abcdefghijklmnopqrstuvwxyz'.split('');
  const words=['the','and','for','you','are','have','that','with','they','from'];
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#001830';
  for(let i=0;i<36;i++){
    const pool=srand()>0.5?upper:lower;
    const c2=pool[Math.floor(srand()*pool.length)], fs=11+srand()*12;
    const x=-p.w*0.44+srand()*p.w*0.88, y=ctop+4+srand()*(ch-8);
    ctx.globalAlpha=0.08+srand()*0.07;
    ctx.font=`${fs}px "Times New Roman",serif`; ctx.fillText(c2,x,y);
  }
  for(let i=0;i<7;i++){
    const w=words[Math.floor(srand()*words.length)], fs=9+srand()*8;
    const x=-p.w*0.42+srand()*p.w*0.84, y=ctop+4+srand()*(ch-8);
    ctx.globalAlpha=0.08; ctx.font=`${fs}px "Times New Roman",serif`; ctx.fillText(w,x,y);
  }
  ctx.globalAlpha=1;
}

// 한국사 — 타임라인 + 한자 + 시대구분선
function drawBgHistory(p, ctop) {
  initRand(103);
  const cbot=p.h/2-8, ch=cbot-ctop;
  const midY=ctop+ch*0.45;
  ctx.strokeStyle='rgba(80,50,8,0.18)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-p.w*0.42,midY); ctx.lineTo(p.w*0.42,midY); ctx.stroke();
  const eras=[{t:'삼국',x:-0.34},{t:'고려',x:-0.16},{t:'조선',x:0.04},{t:'근대',x:0.22},{t:'현대',x:0.36}];
  const fs=Math.max(9,p.w*0.026);
  ctx.font=`${fs}px "Malgun Gothic",sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<eras.length;i++){
    const ex=eras[i].x*p.w;
    ctx.globalAlpha=0.20; ctx.fillStyle='#5a3000';
    ctx.beginPath(); ctx.arc(ex,midY,3.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.10; ctx.strokeStyle='#5a3000'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(ex,ctop+4); ctx.lineTo(ex,cbot-4); ctx.stroke();
    ctx.globalAlpha=0.15; ctx.fillStyle='#3a1e00';
    ctx.fillText(eras[i].t, ex, midY+(i%2===0?-14:+14));
  }
  const hanja='朝鮮高麗古代史近現代三國'.split('');
  ctx.font=`${Math.max(12,p.w*0.034)}px serif`;
  for(let i=0;i<9;i++){

  ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  ctx.strokeStyle=`rgba(160,140,60,${0.25+y*0.45})`; ctx.lineWidth=1.5;
  ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
  // 헤더 — 과목 컬러 틴트
  const hh=p.h*0.13;

  ctx.fillStyle=hexAlpha(lv.color,0.28); ctx.fillRect(-p.w/2,-p.h/2,p.w,hh);
  ctx.strokeStyle=hexAlpha(lv.color,0.30); ctx.lineWidth=0.9;
  ctx.beginPath(); ctx.moveTo(-p.w/2,-p.h/2+hh); ctx.lineTo(p.w/2,-p.h/2+hh); ctx.stroke();
  // 시험명 — vw 기반 폰트 크기
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const fs1=Math.max(10, LW*0.038); // ~4vw
  ctx.font=`bold ${fs1}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle=lv.color; ctx.fillText('대학수학능력시험',0,-p.h/2+hh*0.28);
  const fs2=Math.max(8, LW*0.030); // ~3vw
  ctx.font=`${fs2}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle=`rgba(50,50,70,${0.88-y*0.28})`;
  ctx.fillText(`2026학년도 수능  ·  ${lv.subject} 영역`,0,-p.h/2+hh*0.72);
  // 가로 줄
  const lineTop=-p.h/2+hh+p.h*0.042, lineBot=p.h/2-p.h*0.04, lineGap=Math.max(11,p.h*0.037);
  ctx.strokeStyle=`rgba(140,170,210,${0.17-y*0.05})`; ctx.lineWidth=0.65;

    ctx.beginPath();ctx.moveTo(-p.w/2+p.w*0.07,ly);ctx.lineTo(p.w/2-p.w*0.04,ly);ctx.stroke();
  }
  // 여백선
  ctx.strokeStyle=hexAlpha(lv.color,Math.max(0,0.18-y*0.07)); ctx.lineWidth=0.9;
  ctx.beginPath();ctx.moveTo(-p.w/2+p.w*0.1,-p.h/2+hh+4);ctx.lineTo(-p.w/2+p.w*0.1,p.h/2-4);ctx.stroke();
  // 과목별 배경
  drawSubjectBg(p, -p.h/2+hh+6);
  ctx.restore();
}

// 크랙 그리기 (게임플레이 로직 — 수정 없음)
// ════════════════════════════════════════
function drawCracks(p) {
  if(!cracks.length)return;
  ctx.save(); ctx.translate(p.x+p.w/2+shakeX,p.y+p.h/2+shakeY);
  for(const crack of cracks)
    for(const line of crack.lines){
      if(line.length<2)continue;
      ctx.strokeStyle=`rgba(15,5,0,${0.55+Math.random()*0.2})`; ctx.lineWidth=0.7+Math.random()*0.5;
      ctx.beginPath();ctx.moveTo((line[0].x-0.5)*p.w,(line[0].y-0.5)*p.h);
      for(let k=1;k<line.length;k++)ctx.lineTo((line[k].x-0.5)*p.w,(line[k].y-0.5)*p.h);
      ctx.stroke();
    }
  ctx.restore();
}

function drawProgressBar(progress) {
  const lv=getLv();

// 과목 선택 화면 (모바일 2열 그리드)
// ════════════════════════════════════════
function drawSelectScreen() {
  const cx=LW/2, cleared=getCleared();
  // 타이틀
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const titleFs=Math.max(20, LW*0.07); // 7vw
  ctx.font=`bold ${titleFs}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='#e8f5e9'; ctx.shadowColor='#a5d6a7'; ctx.shadowBlur=18;
  ctx.fillText('수능 시험지 뿌시기',cx,LH*0.075); ctx.shadowBlur=0;
  ctx.font=`${Math.max(11, LW*0.030)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='rgba(170,200,170,0.6)';
  ctx.fillText('과목을 선택하세요',cx,LH*0.130);
  // 소리 안내 문구 — 첫 터치 전에만 표시
  if (!audioReady) {
    ctx.font=`${Math.max(10, LW*0.026)}px "Malgun Gothic",sans-serif`;
    ctx.fillStyle='rgba(255,220,100,0.72)';
    ctx.fillText('🔊 소리를 켜고 플레이하세요',cx,LH*0.158);
  }
  ctx.restore();
  // 카드 그리드 — 2열, 카드 높이 = 너비 × 0.7
  const cols=2, gapX=10, gapY=8;
  const cardW=Math.floor((LW*0.90-gapX*(cols-1))/cols);
  const cardH=Math.max(56, Math.floor(cardW*0.70)); // 최소 56px
  const gridW=cols*cardW+(cols-1)*gapX;
  const startX=cx-gridW/2, startY=LH*0.170;
  levelCardBtns=[];
  for(let i=0;i<levelData.length;i++){
    const row=Math.floor(i/cols), col=i%cols;
    const itemsInRow=Math.min(cols,levelData.length-row*cols);
    const offsetX=itemsInRow===1?(gridW-cardW)/2:col*(cardW+gapX);
    const cx2=startX+offsetX, cy2=startY+row*(cardH+gapY);
    const lv=levelData[i], isCleared=cleared.includes(i), unlocked=isUnlocked(i);
    levelCardBtns.push({x:cx2,y:cy2,w:cardW,h:cardH,idx:i,unlocked});
    // 그림자
    ctx.fillStyle='rgba(0,0,0,0.38)'; roundRect(cx2+2,cy2+2,cardW,cardH,10); ctx.fill();
    // 배경
    const cg=ctx.createLinearGradient(cx2,cy2,cx2,cy2+cardH);
    if(!unlocked){
      cg.addColorStop(0,'rgba(28,28,40,0.96)'); cg.addColorStop(1,'rgba(18,18,28,0.96)');
    } else if(isCleared){
      const [r,g,b]=[parseInt(lv.color.slice(1,3),16),parseInt(lv.color.slice(3,5),16),parseInt(lv.color.slice(5,7),16)];
      cg.addColorStop(0,`rgba(${Math.min(r+40,180)},${Math.min(g+35,140)},${Math.min(b+20,60)},0.96)`);
      cg.addColorStop(1,`rgba(${Math.min(r+20,130)},${Math.min(g+20,100)},${Math.min(b+10,40)},0.96)`);
    } else {
      const [r,g,b]=[parseInt(lv.color.slice(1,3),16),parseInt(lv.color.slice(3,5),16),parseInt(lv.color.slice(5,7),16)];
      cg.addColorStop(0,`rgba(${Math.max(r-20,10)},${Math.max(g-20,10)},${Math.max(b-20,10)},0.96)`);
      cg.addColorStop(1,`rgba(${Math.max(r-30,5)},${Math.max(g-30,5)},${Math.max(b-30,5)},0.96)`);
    }
    ctx.fillStyle=cg; roundRect(cx2,cy2,cardW,cardH,10); ctx.fill();
    // 테두리
    ctx.strokeStyle=!unlocked?'rgba(70,70,90,0.45)':isCleared?hexAlpha(lv.color,0.85):hexAlpha(lv.color,0.55);
    ctx.lineWidth=1.6; roundRect(cx2,cy2,cardW,cardH,10); ctx.stroke();
    // 내용
    ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
    if(!unlocked){
      ctx.font=`${Math.max(18,cardH*0.32)}px sans-serif`; ctx.fillStyle='rgba(100,100,120,0.55)';
      ctx.fillText('🔒',cx2+cardW/2,cy2+cardH*0.40);
      ctx.font=`${Math.max(9,cardH*0.15)}px "Malgun Gothic",sans-serif`; ctx.fillStyle='rgba(120,120,140,0.62)';
      ctx.fillText('이전 과목 클리어 필요',cx2+cardW/2,cy2+cardH*0.78);
    } else {
      const gfs=Math.max(13, LW*0.040); // 4vw 과목명
      ctx.font=`bold ${gfs}px "Malgun Gothic",sans-serif`;
      ctx.fillStyle=isCleared?'#ffd700':lv.color==='#003580'?'#99ccff':lv.color==='#8B0000'?'#ffaaaa':'#d0f0d0';
      if(!isCleared)ctx.fillStyle='#e8e8f8';
      ctx.fillText(lv.subject,cx2+cardW/2,cy2+cardH*0.28);
      ctx.font=`${Math.max(9,cardH*0.165)}px "Malgun Gothic",sans-serif`;
      ctx.fillStyle=isCleared?'rgba(255,228,140,0.82)':'rgba(190,190,210,0.72)';
      ctx.fillText(`목표 ${lv.goal}회  ·  ${lv.timeLimit}초`,cx2+cardW/2,cy2+cardH*0.54);
      if(isCleared){
        ctx.font=`bold ${Math.max(10,cardH*0.17)}px "Malgun Gothic",sans-serif`;
        ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=6;
        ctx.fillText('찢음 ✓',cx2+cardW/2,cy2+cardH*0.82); ctx.shadowBlur=0;
      }
    }
    ctx.restore();
  }
}

// ════════════════════════════════════════
// 게임 시작 안내 ('ready')
// ════════════════════════════════════════
function drawReadyOverlay() {
  const lv=getLv(), cx=LW/2, cy=LH/2;
  ctx.fillStyle='rgba(0,0,0,0.46)'; ctx.fillRect(0,0,LW,LH);
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`${Math.max(12, LW*0.030)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='rgba(180,200,210,0.72)'; ctx.fillText(`2026학년도 수능  ·  ${lv.subject} 영역`,cx,cy-64);
  ctx.font=`bold ${Math.max(18, LW*0.050)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='rgba(255,255,200,0.92)'; ctx.fillText('시험지를 클릭/터치해서 찢어라!',cx,cy-22);
  ctx.font=`${Math.max(12, LW*0.028)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='rgba(190,210,190,0.72)'; ctx.fillText(`목표 ${lv.goal}번 클릭   ·   제한시간 ${lv.timeLimit}초`,cx,cy+18);
  const blink=0.78+Math.sin(Date.now()*0.0052)*0.22;
  ctx.globalAlpha=blink; ctx.font=`bold ${Math.max(14, LW*0.038)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='#ffd700'; ctx.fillText('▶ 시험지를 클릭해서 시작!',cx,cy+60);
  ctx.restore();
}

// ════════════════════════════════════════
// 성공 오버레이
// ════════════════════════════════════════
function drawSuccessOverlay() {
  const ph=successPhase, cx=LW/2, cy=LH/2;
  const lv=getLv(), isLast=currentLevelIdx===levelData.length-1;
  ctx.fillStyle=`rgba(0,15,0,${Math.min(0.68,ph*1.5)})`; ctx.fillRect(0,0,LW,LH);
  if(ph<0.28)return;
  const a=Math.min(1,(ph-0.28)/0.38);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
  if(isLast){
    ctx.font=`bold ${Math.max(22, LW*0.060)}px "Malgun Gothic",sans-serif`;
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffec6e'; ctx.shadowBlur=28;
    ctx.fillText('수능 완전 정복! 🎉',cx,cy-72); ctx.shadowBlur=0;
    ctx.font=`${Math.max(13, LW*0.030)}px "Malgun Gothic",sans-serif`;
    ctx.fillStyle='rgba(200,255,200,0.88)'; ctx.fillText('7개 과목 시험지를 모두 찢었다!',cx,cy-26);
  } else {
    ctx.font=`bold ${Math.max(22, LW*0.062)}px "Malgun Gothic",sans-serif`;
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffec6e'; ctx.shadowBlur=26;
    ctx.fillText(`${lv.subject} 시험지 완파!`,cx,cy-62); ctx.shadowBlur=0;
    ctx.font=`${Math.max(12, LW*0.028)}px "Malgun Gothic",sans-serif`;
    ctx.fillStyle='rgba(190,255,190,0.85)'; ctx.fillText('시험지를 완전히 찢어버렸다!',cx,cy-16);
  }
  if(ph>0.65){
    const bw=Math.min(LW*0.72,260), bh=Math.max(56,LH*0.072);
    if(isLast){
      btnPrimary={x:cx-bw/2,y:cy+30,w:bw,h:bh};
      drawBtn(btnPrimary,'과목 선택으로','#555570','#3a3a55','#7777aa');
    } else {
      btnPrimary={x:cx-bw/2,y:cy+22,w:bw,h:bh};
      const nextLv=levelData[currentLevelIdx+1];
      const c=nextLv.color, [r2,g2,b2]=[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
      drawBtn(btnPrimary,`다음: ${nextLv.subject} →`,`rgba(${Math.min(r2+40,220)},${Math.min(g2+40,180)},${Math.min(b2+40,120)},1)`,c,hexAlpha(c,0.85));
      const bw2=Math.min(LW*0.55,200), bh2=Math.max(48,LH*0.062);
      btnSecondary={x:cx-bw2/2,y:cy+22+bh+10,w:bw2,h:bh2};
      drawBtn(btnSecondary,'과목 선택으로','#444458','#333348','#666688');
    }
  }
  ctx.restore();
}

// ════════════════════════════════════════
// 실패 오버레이
// ════════════════════════════════════════
function drawFailOverlay() {
  const ph=failPhase, cx=LW/2, cy=LH/2, lv=getLv();
  ctx.fillStyle=`rgba(20,0,0,${Math.min(0.7,ph*1.4)})`; ctx.fillRect(0,0,LW,LH);
  if(ph<0.22)return;
  const a=Math.min(1,(ph-0.22)/0.35);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.max(22, LW*0.060)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='#e74c3c'; ctx.shadowColor='#800'; ctx.shadowBlur=22;
  ctx.fillText('다음엔 꼭 찢자...',cx,cy-58); ctx.shadowBlur=0;
  ctx.font=`${Math.max(12, LW*0.028)}px "Malgun Gothic",sans-serif`;
  ctx.fillStyle='rgba(210,150,150,0.82)';
  ctx.fillText(`${taps}번 밖에 못 찢었어... (목표: ${lv.goal}번)`,cx,cy-12);
  if(ph>0.55){
    const bw=Math.min(LW*0.56,220), bh=Math.max(56,LH*0.072);
    btnPrimary={x:cx-bw/2,y:cy+26,w:bw,h:bh};
    drawBtn(btnPrimary,'다시 도전','#c0392b','#922b21','#ec7063');
    const bw2=Math.min(LW*0.50,190), bh2=Math.max(48,LH*0.062);
    btnSecondary={x:cx-bw2/2,y:cy+26+bh+10,w:bw2,h:bh2};
    drawBtn(btnSecondary,'과목 선택으로','#444458','#333348','#666688');
  }
  ctx.restore();
}

// ════════════════════════════════════════
// 레벨 리셋 (게임플레이 로직 — 수정 없음)
// ════════════════════════════════════════
function resetGame() {
  const lv=getLv();
  state='ready'; taps=0; timeLeft=lv.timeLimit; timerAccum=0; lastSecond=lv.timeLimit; timerPulse=0;
  shakeX=0;shakeY=0;shakeFr=0; stampSlam=0;successPhase=0;failPhase=0;fwTimer=0;
  cracks=[];particles=[];
  btnPrimary={x:0,y:0,w:0,h:0}; btnSecondary={x:0,y:0,w:0,h:0};
  currentFwColors=lv.fwColors;
}

// ════════════════════════════════════════
// 터치 처리
// ════════════════════════════════════════
function handlePointer(clientX, clientY) {
  // 모바일 오디오 잠금 해제 — 매 터치마다 확인
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  const rect=canvas.getBoundingClientRect();
  // DPR 스케일 적용 후 논리 픽셀로 좌표 변환
  const px=(clientX-rect.left)*(LW/rect.width);
  const py=(clientY-rect.top)*(LH/rect.height);

  if(state==='select'){
    for(const card of levelCardBtns){
      if(!card.unlocked)continue;
      if(hitBtn(px,py,card)){currentLevelIdx=card.idx;resetGame();return;}
    }
    return;
  }
  if(state==='success'){
    if(hitBtn(px,py,btnPrimary)){
      if(currentLevelIdx===levelData.length-1)state='select';
      else{currentLevelIdx++;resetGame();}
      return;
    }
    if(hitBtn(px,py,btnSecondary)){state='select';return;}
    return;
  }
  if(state==='fail'){
    if(hitBtn(px,py,btnPrimary)){resetGame();return;}
    if(hitBtn(px,py,btnSecondary)){state='select';return;}
    return;
  }
  // ready / playing
  const paper=getPaper();
  if(px<paper.x||px>paper.x+paper.w||py<paper.y||py>paper.y+paper.h)return;
  if(state==='ready')state='playing';
  taps++; playTear(); addCrack(px,py,paper);
  if(particles.length < particleLimit){
    const n=2+Math.floor(Math.random()*2);
    for(let i=0;i<n;i++)particles.push(new PaperBit(px,py,false));
  }
  const intensity=2.5+Math.random()*3.5;
  shakeX=(Math.random()-0.5)*intensity*2; shakeY=(Math.random()-0.5)*intensity*2; shakeFr=9;
  if(taps>=getLv().goal&&state==='playing'){
    markCleared(currentLevelIdx); state='success'; playBigTear(); spawnSuccessExplosion();
  }
}

// 멀티터치 + 스크롤 방지
canvas.addEventListener('click', e => handlePointer(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches) handlePointer(t.clientX, t.clientY);
}, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false});

// ════════════════════════════════════════
// 게임 루프
// ════════════════════════════════════════
function gameLoop(timestamp) {
  const dt=Math.min(timestamp-lastTime,50); lastTime=timestamp;

  // 성능 자동 조절: 프레임 타임 20ms 초과 시 파티클 절반으로
  _perfFrameTime = _perfFrameTime * 0.9 + dt * 0.1;
  particleLimit = _perfFrameTime > 20 ? 30 : 60;

  drawBackground();
  if(state==='select'){drawSelectScreen();requestAnimationFrame(gameLoop);return;}
  const paper=getPaper(), progress=Math.min(taps/getLv().goal,1);
  if(shakeFr>0){shakeFr--;shakeX*=0.68;shakeY*=0.68;}else{shakeX=0;shakeY=0;}
  if(state==='playing'){
    timerAccum+=dt;
    if(timerAccum>=1000){
      timeLeft-=Math.floor(timerAccum/1000); timerAccum=timerAccum%1000;
      const sec=Math.ceil(timeLeft);
      if(sec<lastSecond){lastSecond=sec;if(timeLeft<=10)timerPulse=1.0;}
      if(timeLeft<=0){timeLeft=0;state='fail';playFailSound();stampSlam=0;}
    }
    timerPulse=Math.max(0,timerPulse-dt*0.0028);
  }
  if(state==='fail'){stampSlam=Math.min(1,stampSlam+dt*0.006);failPhase=Math.min(1,failPhase+dt*0.003);}
  if(state==='success'){
    successPhase=Math.min(1,successPhase+dt*0.0022); fwTimer+=dt;
    if(fwTimer>=360){spawnFirework();fwTimer=fwTimer%360;}
  }
  if(state!=='success'||successPhase<0.45){
    const alpha=state==='success'?Math.max(0,1-successPhase*2.8):1;
    ctx.save();ctx.globalAlpha=alpha;drawPaper(paper,progress);drawCracks(paper);ctx.restore();
  }
  for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1);}
  if(state==='playing'||state==='ready'){drawTimer();drawProgressBar(progress);}
  if(state==='playing'&&timeLeft<=10){
    const pulse=(Math.sin(Date.now()*0.013)*0.5+0.5)*0.07;
    ctx.fillStyle=`rgba(120,0,0,${pulse})`;ctx.fillRect(0,0,LW,LH);
  }
  if(state==='ready')drawReadyOverlay();
  if(state==='success')drawSuccessOverlay();
  if(state==='fail')drawFailOverlay();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(t=>{lastTime=t;gameLoop(t);});
</script>
